[project]
name = "phi-guard"
version = "0.1.0"
description = "Data-residency guard: classifies model endpoints and blocks or de-identifies PHI before it leaves the Kingdom"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/phi_guard"]
