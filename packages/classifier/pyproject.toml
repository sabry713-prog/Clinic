[project]
name = "classifier"
version = "0.1.0"
description = "Query classifier package for Clinical Copilot (stub for Slice 0)"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2.0",
    "mypy>=1.10.0",
    "ruff>=0.4.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/classifier"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.mypy]
python_version = "3.12"
strict = true
