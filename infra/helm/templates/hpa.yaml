---
# HPA for core service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "clinical-copilot.fullname" . }}-core
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "clinical-copilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: core
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "clinical-copilot.fullname" . }}-core
  minReplicas: {{ .Values.hpa.core.minReplicas }}
  maxReplicas: {{ .Values.hpa.core.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.core.targetCPUUtilizationPercentage }}
---
# HPA for qa service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "clinical-copilot.fullname" . }}-qa
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "clinical-copilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: qa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "clinical-copilot.fullname" . }}-qa
  minReplicas: {{ .Values.hpa.qa.minReplicas }}
  maxReplicas: {{ .Values.hpa.qa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.qa.targetCPUUtilizationPercentage }}
