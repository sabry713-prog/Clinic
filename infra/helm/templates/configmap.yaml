apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clinical-copilot.fullname" . }}-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "clinical-copilot.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
