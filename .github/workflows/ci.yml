name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  PNPM_VERSION: "9.1.0"

jobs:
  # ─── Lint & type check ────────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type Check (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - node
          - python-narrative
          - python-qa

    steps:
      - uses: actions/checkout@v4

      # Node targets
      - name: Setup Node
        if: matrix.target == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        if: matrix.target == 'node'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: pnpm install
        if: matrix.target == 'node'
        run: pnpm install --frozen-lockfile

      - name: Lint (Node)
        if: matrix.target == 'node'
        run: pnpm run lint

      - name: Type check (Node)
        if: matrix.target == 'node'
        run: pnpm run typecheck

      # Python — narrative
      - name: Setup Python
        if: matrix.target == 'python-narrative'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        if: matrix.target == 'python-narrative'
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: uv sync (narrative)
        if: matrix.target == 'python-narrative'
        working-directory: apps/narrative
        run: uv sync

      - name: Ruff lint (narrative)
        if: matrix.target == 'python-narrative'
        working-directory: apps/narrative
        run: uv run ruff check .

      - name: mypy (narrative)
        if: matrix.target == 'python-narrative'
        working-directory: apps/narrative
        run: uv run mypy src/ main.py

      # Python — qa
      - name: Setup Python
        if: matrix.target == 'python-qa'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        if: matrix.target == 'python-qa'
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: uv sync (qa)
        if: matrix.target == 'python-qa'
        working-directory: apps/qa
        run: uv sync

      - name: Ruff lint (qa)
        if: matrix.target == 'python-qa'
        working-directory: apps/qa
        run: uv run ruff check .

      - name: mypy (qa)
        if: matrix.target == 'python-qa'
        working-directory: apps/qa
        run: uv run mypy src/ main.py

  # ─── Tests ────────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - node
          - python-narrative
          - python-qa

    steps:
      - uses: actions/checkout@v4

      # Node
      - name: Setup Node
        if: matrix.target == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        if: matrix.target == 'node'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: pnpm install
        if: matrix.target == 'node'
        run: pnpm install --frozen-lockfile

      - name: Build packages (Node)
        if: matrix.target == 'node'
        run: |
          pnpm --filter @clinical-copilot/shared-types run build
          pnpm --filter @clinical-copilot/audit run build

      - name: Test (Node)
        if: matrix.target == 'node'
        run: pnpm run test
        env:
          NODE_ENV: test

      # Python — narrative
      - name: Setup Python
        if: matrix.target == 'python-narrative'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        if: matrix.target == 'python-narrative'
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: uv sync (narrative)
        if: matrix.target == 'python-narrative'
        working-directory: apps/narrative
        run: uv sync

      - name: pytest (narrative)
        if: matrix.target == 'python-narrative'
        working-directory: apps/narrative
        run: uv run pytest --tb=short

      # Python — qa
      - name: Setup Python
        if: matrix.target == 'python-qa'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        if: matrix.target == 'python-qa'
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: uv sync (qa)
        if: matrix.target == 'python-qa'
        working-directory: apps/qa
        run: uv sync

      - name: pytest (qa)
        if: matrix.target == 'python-qa'
        working-directory: apps/qa
        run: uv run pytest --tb=short

  # ─── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Build all Node packages
        run: pnpm run build

  # ─── Docker image push (main branch only) ────────────────────────────────────
  docker-push:
    name: Docker Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: core
            context: .
            file: apps/core/Dockerfile
            image: clinical-copilot/core
          - name: web
            context: .
            file: apps/web/Dockerfile
            image: clinical-copilot/web
          - name: narrative
            context: apps/narrative
            file: apps/narrative/Dockerfile
            image: clinical-copilot/narrative
          - name: qa
            context: apps/qa
            file: apps/qa/Dockerfile
            image: clinical-copilot/qa

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.file }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service.image }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
